# This is a basic workflow to help you get started with Actions

name: Generate & Upload Test Build

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    name: Run SRB2C on Windows
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5.1.1
        with:
            python-version: '3.10' 

      - name: SRB2Compile
        run: |
         python3 .github\workflows\SRB2C.py -zip ".\pk3\" ".\" "L_LUAMUSICDEF-${{ github.run_number }}_$(git rev-parse --abbrev-ref HEAD).pk3"  

      - name: Shortened Hash
        uses: 2428392/gh-truncate-string-action@v1
        id: truncatedString
        with:
            stringToTruncate: ${{ github.sha }}
            maxLength: 6
      - name: Upload to Discord
        run: |
          curl -F 'payload_json={"content": "Commit - [${{ steps.truncatedString.outputs.string }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"}' -F "file1=@L_LUAMUSICDEF-${{ github.run_number }}_$(git rev-parse --abbrev-ref HEAD).pk3" ${{ secrets.DISCORD_WEBHOOK_URL }}   
